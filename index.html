<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Flight Game</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #1a1a1a;
    font-family: 'Courier New', monospace;
}

.game-container {
    position: relative;
    width: 800px;
    height: 600px;
    border: 4px solid #fff;
    box-shadow: 0 0 20px rgba(0, 200, 255, 0.5);
    background: #87ceeb;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
}

canvas {
    display: block;
    background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%);
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    image-rendering: crisp-edges;
}

.hud {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    justify-content: space-between;
    font-size: 24px;
    font-weight: bold;
    color: #fff;
    text-shadow: 2px 2px 0px #000, -2px -2px 0px #000;
    z-index: 10;
    font-family: 'Courier New', monospace;
    letter-spacing: 2px;
}

.score, .timer {
    background: rgba(0, 0, 0, 0.7);
    padding: 8px 16px;
    border: 2px solid #fff;
    box-shadow: 0 0 10px rgba(0, 200, 255, 0.7);
}

.game-over {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.95);
    z-index: 100;
    justify-content: center;
    align-items: center;
}

.game-over.show {
    display: flex;
}

.game-over-content {
    background: #000;
    padding: 40px;
    border: 4px solid #fff;
    text-align: center;
    box-shadow: 0 0 20px rgba(0, 200, 255, 0.8);
}

.game-over-content h1 {
    font-size: 48px;
    color: #ff0000;
    margin-bottom: 20px;
    text-shadow: 2px 2px 0px #00ffff;
    font-family: 'Courier New', monospace;
}

.game-over-content p {
    font-size: 28px;
    color: #ffff00;
    margin-bottom: 30px;
    font-family: 'Courier New', monospace;
}

.game-over-content button {
    padding: 12px 30px;
    font-size: 20px;
    background: #00ffff;
    color: #000;
    border: 3px solid #fff;
    border-radius: 0;
    cursor: pointer;
    font-family: 'Courier New', monospace;
    font-weight: bold;
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
    transition: all 0.2s;
}

.game-over-content button:hover {
    background: #ffff00;
    box-shadow: 0 0 20px rgba(255, 255, 0, 0.8);
}
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="hud">
            <div class="score">SCORE <span id="score">001600</span></div>
            <div class="timer">TIME <span id="timer">02:39</span></div>
        </div>
        <div class="game-over" id="gameOver">
            <div class="game-over-content">
                <h1>GAME OVER!</h1>
                <p>FINAL SCORE: <span id="finalScore">0</span></p>
                <button onclick="location.reload()">PLAY AGAIN</button>
            </div>
        </div>
    </div>
    <script>
// Game Canvas Setup
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
ctx.imageSmoothingEnabled = false;

// Game Variables
let gameRunning = true;
let score = 0;
let time = 0;
let gameStartTime = Date.now();
let frameCount = 0;

// Cat Player Object
const cat = {
    x: 100,
    y: canvas.height / 2,
    width: 32,
    height: 24,
    velocityY: 0,
    gravity: 0.4,
    jumpPower: -10,
    color: '#ff9800',
    wingFrame: 0
};

// Obstacles Array (flying insects)
let obstacles = [];
let obstacleTimer = 0;
const OBSTACLE_SPAWN_RATE = 100;

// Collectibles Array (bushes)
let collectibles = [];
let collectibleTimer = 0;
const COLLECTIBLE_SPAWN_RATE = 80;

// Input Handling
let isSpacePressed = false;

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        isSpacePressed = true;
        e.preventDefault();
    }
});

window.addEventListener('keyup', (e) => {
    if (e.code === 'Space') {
        isSpacePressed = false;
    }
});

window.addEventListener('click', () => {
    if (gameRunning) {
        cat.velocityY = cat.jumpPower;
    }
});

// Obstacle Class (Insects/Flies)
class Obstacle {
    constructor() {
        this.width = 16;
        this.height = 16;
        this.x = canvas.width;
        this.y = Math.random() * (canvas.height - 60) + 30;
        this.speed = 4;
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = Math.random() * 0.05 + 0.02;
    }

    update() {
        this.x -= this.speed;
        this.wobble += this.wobbleSpeed;
        this.y += Math.sin(this.wobble) * 0.5;
    }

    draw() {
        // Draw insect/fly
        ctx.fillStyle = '#333';
        // Body
        ctx.fillRect(this.x + 6, this.y + 6, 4, 8);
        // Head
        ctx.fillRect(this.x + 5, this.y + 4, 6, 2);
        // Wings
        ctx.fillStyle = '#999';
        ctx.fillRect(this.x + 2, this.y + 7, 3, 4);
        ctx.fillRect(this.x + 11, this.y + 7, 3, 4);
    }

    isOffScreen() {
        return this.x + this.width < 0;
    }
}

// Collectible Class (Bushes/Plants)
class Collectible {
    constructor() {
        this.width = 24;
        this.height = 24;
        this.x = canvas.width + 20;
        this.y = Math.random() * (canvas.height - 60) + 30;
        this.speed = 4;
    }

    update() {
        this.x -= this.speed;
    }

    draw() {
        // Draw pixelated bush
        ctx.fillStyle = '#4caf50';
        // Main bush shape
        ctx.fillRect(this.x + 6, this.y + 12, 12, 12);
        ctx.fillRect(this.x + 4, this.y + 8, 4, 6);
        ctx.fillRect(this.x + 16, this.y + 8, 4, 6);
        ctx.fillRect(this.x + 8, this.y + 4, 8, 6);
        
        ctx.fillStyle = '#5cbf60';
        ctx.fillRect(this.x + 10, this.y + 6, 4, 4);
        ctx.fillRect(this.x + 8, this.y + 10, 3, 3);
        ctx.fillRect(this.x + 14, this.y + 10, 3, 3);
    }

    isOffScreen() {
        return this.x + this.width < 0;
    }
}

// Draw Cat
function drawCat() {
    const x = cat.x;
    const y = cat.y;
    
    // Draw cute pixelated cat
    ctx.fillStyle = cat.color;
    
    // Body
    ctx.fillRect(x + 8, y + 8, 16, 12);
    
    // Head
    ctx.fillRect(x + 6, y + 2, 10, 10);
    
    // Ears
    ctx.fillStyle = cat.color;
    ctx.fillRect(x + 6, y, 3, 3);
    ctx.fillRect(x + 17, y, 3, 3);
    ctx.fillStyle = '#ffccaa';
    ctx.fillRect(x + 7, y + 1, 1, 1);
    ctx.fillRect(x + 18, y + 1, 1, 1);
    
    // Eyes
    ctx.fillStyle = '#000';
    ctx.fillRect(x + 8, y + 4, 2, 2);
    ctx.fillRect(x + 14, y + 4, 2, 2);
    
    // Eye shine
    ctx.fillStyle = '#fff';
    ctx.fillRect(x + 9, y + 4, 1, 1);
    ctx.fillRect(x + 15, y + 4, 1, 1);
    
    // Nose
    ctx.fillStyle = '#ff99cc';
    ctx.fillRect(x + 11, y + 7, 2, 1);
    
    // Tail
    ctx.fillStyle = cat.color;
    cat.wingFrame = (frameCount % 20) < 10 ? 0 : 1;
    const tailY = y + 12 + (cat.wingFrame ? 2 : 0);
    ctx.fillRect(x + 24, tailY, 4, 8);
    ctx.fillRect(x + 22, tailY + 2, 2, 4);
}

// Collision Detection
function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

// Draw Parallax Clouds
function drawClouds() {
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    
    for (let i = 0; i < 5; i++) {
        const cloudX = (frameCount * 0.2 + i * 300) % (canvas.width + 100);
        const cloudY = 40 + i * 120;
        
        // Pixelated cloud
        ctx.fillRect(cloudX, cloudY, 8, 4);
        ctx.fillRect(cloudX + 8, cloudY - 4, 12, 8);
        ctx.fillRect(cloudX + 20, cloudY, 8, 4);
        ctx.fillRect(cloudX + 28, cloudY - 2, 8, 6);
    }
}

// Update Game State
function update() {
    if (!gameRunning) return;

    frameCount++;
    
    // Update time
    time = Math.floor((Date.now() - gameStartTime) / 1000);
    const minutes = Math.floor(time / 60);
    const seconds = time % 60;
    document.getElementById('timer').textContent = 
        String(minutes).padStart(2, '0') + ':' + String(seconds).padStart(2, '0');

    // Apply gravity to cat
    cat.velocityY += cat.gravity;
    cat.y += cat.velocityY;

    // Handle space/click input
    if (isSpacePressed) {
        cat.velocityY = cat.jumpPower;
    }

    // Boundary check
    if (cat.y + cat.height > canvas.height) {
        endGame();
    }
    if (cat.y < 0) {
        cat.y = 0;
        cat.velocityY = 0;
    }

    // Spawn obstacles
    obstacleTimer++;
    if (obstacleTimer > OBSTACLE_SPAWN_RATE) {
        obstacles.push(new Obstacle());
        obstacleTimer = 0;
    }

    // Spawn collectibles
    collectibleTimer++;
    if (collectibleTimer > COLLECTIBLE_SPAWN_RATE) {
        collectibles.push(new Collectible());
        collectibleTimer = 0;
    }

    // Update obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].update();

        if (checkCollision(cat, obstacles[i])) {
            endGame();
        }

        if (obstacles[i].isOffScreen()) {
            obstacles.splice(i, 1);
            score += 10;
            document.getElementById('score').textContent = String(score).padStart(6, '0');
        }
    }

    // Update collectibles
    for (let i = collectibles.length - 1; i >= 0; i--) {
        collectibles[i].update();

        if (checkCollision(cat, collectibles[i])) {
            collectibles.splice(i, 1);
            score += 50;
            document.getElementById('score').textContent = String(score).padStart(6, '0');
        } else if (collectibles[i].isOffScreen()) {
            collectibles.splice(i, 1);
        }
    }
}

// Draw Game
function draw() {
    // Clear canvas with gradient
    const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
    gradient.addColorStop(0, '#87ceeb');
    gradient.addColorStop(1, '#e0f6ff');
    ctx.fillStyle = gradient;
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw clouds
    drawClouds();

    // Draw collectibles
    collectibles.forEach(collectible => collectible.draw());

    // Draw obstacles
    obstacles.forEach(obstacle => obstacle.draw());

    // Draw cat
    drawCat();
}

// End Game
function endGame() {
    gameRunning = false;
    document.getElementById('finalScore').textContent = String(score).padStart(6, '0');
    document.getElementById('gameOver').classList.add('show');
}

// Game Loop
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Start Game
document.getElementById('score').textContent = '000000';
gameLoop();
    </script>
</body>
</html>
