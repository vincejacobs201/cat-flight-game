<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cat Flight Game</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    font-family: 'Arial', sans-serif;
}

.game-container {
    position: relative;
    width: 800px;
    height: 600px;
    border: 3px solid #fff;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
    background: #87ceeb;
}

canvas {
    display: block;
    background: linear-gradient(180deg, #87ceeb 0%, #e0f6ff 100%);
}

.hud {
    position: absolute;
    top: 10px;
    left: 10px;
    right: 10px;
    display: flex;
    justify-content: space-between;
    font-size: 20px;
    font-weight: bold;
    color: #333;
    text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.8);
    z-index: 10;
}

.score, .timer {
    background: rgba(255, 255, 255, 0.9);
    padding: 8px 16px;
    border-radius: 8px;
    box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
}

.game-over {
    display: none;
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    z-index: 100;
    justify-content: center;
    align-items: center;
}

.game-over.show {
    display: flex;
}

.game-over-content {
    background: #fff;
    padding: 40px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
}

.game-over-content h1 {
    font-size: 48px;
    color: #e74c3c;
    margin-bottom: 20px;
}

.game-over-content p {
    font-size: 28px;
    color: #333;
    margin-bottom: 30px;
}

.game-over-content button {
    padding: 12px 30px;
    font-size: 20px;
    background: #667eea;
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.3s;
}

.game-over-content button:hover {
    background: #764ba2;
}
    </style>
</head>
<body>
    <div class="game-container">
        <canvas id="gameCanvas" width="800" height="600"></canvas>
        <div class="hud">
            <div class="score">Score: <span id="score">0</span></div>
            <div class="timer">Time: <span id="timer">0</span>s</div>
        </div>
        <div class="game-over" id="gameOver">
            <div class="game-over-content">
                <h1>GAME OVER!</h1>
                <p>Final Score: <span id="finalScore">0</span></p>
                <button onclick="location.reload()">Play Again</button>
            </div>
        </div>
    </div>
    <script>
// Game Canvas Setup
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// Game Variables
let gameRunning = true;
let score = 0;
let time = 0;
let gameStartTime = Date.now();

// Cat Player Object
const cat = {
    x: 100,
    y: canvas.height / 2,
    width: 40,
    height: 40,
    velocityY: 0,
    gravity: 0.5,
    jumpPower: -12,
    color: '#ff9800'
};

// Obstacles Array
let obstacles = [];
let obstacleTimer = 0;
const OBSTACLE_SPAWN_RATE = 120; // frames between spawns

// Collectibles Array
let collectibles = [];
let collectibleTimer = 0;
const COLLECTIBLE_SPAWN_RATE = 100;

// Input Handling
let isSpacePressed = false;

window.addEventListener('keydown', (e) => {
    if (e.code === 'Space') {
        isSpacePressed = true;
        e.preventDefault();
    }
});

window.addEventListener('keyup', (e) => {
    if (e.code === 'Space') {
        isSpacePressed = false;
    }
});

window.addEventListener('click', () => {
    if (gameRunning) {
        cat.velocityY = cat.jumpPower;
    }
});

// Obstacle Class
class Obstacle {
    constructor() {
        this.width = 60;
        this.height = Math.random() * 150 + 50;
        this.x = canvas.width;
        this.y = Math.random() * (canvas.height - this.height);
        this.speed = 5;
        this.color = '#e74c3c';
    }

    update() {
        this.x -= this.speed;
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.fillRect(this.x, this.y, this.width, this.height);
        // Draw warning color
        ctx.strokeStyle = '#c0392b';
        ctx.lineWidth = 2;
        ctx.strokeRect(this.x, this.y, this.width, this.height);
    }

    isOffScreen() {
        return this.x + this.width < 0;
    }
}

// Collectible Class
class Collectible {
    constructor() {
        this.radius = 8;
        this.x = canvas.width + 20;
        this.y = Math.random() * (canvas.height - 40) + 20;
        this.speed = 5;
        this.color = '#4caf50';
    }

    update() {
        this.x -= this.speed;
    }

    draw() {
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#388e3c';
        ctx.lineWidth = 2;
        ctx.stroke();
    }

    isOffScreen() {
        return this.x + this.radius < 0;
    }
}

// Draw Cat
function drawCat() {
    // Body
    ctx.fillStyle = cat.color;
    ctx.fillRect(cat.x, cat.y, cat.width, cat.height);

    // Head
    ctx.fillStyle = cat.color;
    ctx.beginPath();
    ctx.arc(cat.x + cat.width - 8, cat.y + 10, 12, 0, Math.PI * 2);
    ctx.fill();

    // Ears
    ctx.fillStyle = cat.color;
    ctx.beginPath();
    ctx.moveTo(cat.x + cat.width - 15, cat.y);
    ctx.lineTo(cat.x + cat.width - 10, cat.y - 8);
    ctx.lineTo(cat.x + cat.width - 5, cat.y);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(cat.x + cat.width - 12, cat.y + 8, 2, 0, Math.PI * 2);
    ctx.fill();

    // Tail
    ctx.strokeStyle = cat.color;
    ctx.lineWidth = 4;
    ctx.beginPath();
    ctx.moveTo(cat.x + 5, cat.y + 15);
    ctx.quadraticCurveTo(cat.x - 10, cat.y + 10, cat.x - 15, cat.y + 20);
    ctx.stroke();
}

// Collision Detection
function checkCollision(rect1, rect2) {
    return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
}

function checkCircleCollision(cat, circle) {
    const catCenterX = cat.x + cat.width / 2;
    const catCenterY = cat.y + cat.height / 2;
    const distance = Math.sqrt(
        Math.pow(catCenterX - circle.x, 2) +
        Math.pow(catCenterY - circle.y, 2)
    );
    return distance < cat.width / 2 + circle.radius;
}

// Update Game State
function update() {
    if (!gameRunning) return;

    // Update time
    time = Math.floor((Date.now() - gameStartTime) / 1000);
    document.getElementById('timer').textContent = time;

    // Apply gravity to cat
    cat.velocityY += cat.gravity;
    cat.y += cat.velocityY;

    // Handle space/click input
    if (isSpacePressed) {
        cat.velocityY = cat.jumpPower;
    }

    // Boundary check
    if (cat.y + cat.height > canvas.height) {
        endGame();
    }
    if (cat.y < 0) {
        cat.y = 0;
        cat.velocityY = 0;
    }

    // Spawn obstacles
    obstacleTimer++;
    if (obstacleTimer > OBSTACLE_SPAWN_RATE) {
        obstacles.push(new Obstacle());
        obstacleTimer = 0;
    }

    // Spawn collectibles
    collectibleTimer++;
    if (collectibleTimer > COLLECTIBLE_SPAWN_RATE) {
        collectibles.push(new Collectible());
        collectibleTimer = 0;
    }

    // Update obstacles
    for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].update();

        // Check collision with cat
        if (checkCollision(cat, obstacles[i])) {
            endGame();
        }

        // Remove off-screen obstacles
        if (obstacles[i].isOffScreen()) {
            obstacles.splice(i, 1);
            score += 10;
            document.getElementById('score').textContent = score;
        }
    }

    // Update collectibles
    for (let i = collectibles.length - 1; i >= 0; i--) {
        collectibles[i].update();

        // Check collision with cat
        if (checkCircleCollision(cat, collectibles[i])) {
            collectibles.splice(i, 1);
            score += 25;
            document.getElementById('score').textContent = score;
        } else if (collectibles[i].isOffScreen()) {
            collectibles.splice(i, 1);
        }
    }
}

// Draw Game
function draw() {
    // Clear canvas
    ctx.fillStyle = 'rgba(135, 206, 235, 0.3)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw clouds (background elements)
    ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
    for (let i = 0; i < 3; i++) {
        const cloudY = 50 + i * 150;
        const cloudX = (time * 0.3 + i * 200) % (canvas.width + 100);
        drawCloud(cloudX, cloudY);
    }

    // Draw obstacles
    obstacles.forEach(obstacle => obstacle.draw());

    // Draw collectibles
    collectibles.forEach(collectible => collectible.draw());

    // Draw cat
    drawCat();
}

function drawCloud(x, y) {
    ctx.beginPath();
    ctx.arc(x, y, 20, 0, Math.PI * 2);
    ctx.arc(x + 15, y - 15, 25, 0, Math.PI * 2);
    ctx.arc(x + 35, y, 20, 0, Math.PI * 2);
    ctx.fill();
}

// End Game
function endGame() {
    gameRunning = false;
    document.getElementById('finalScore').textContent = score;
    document.getElementById('gameOver').classList.add('show');
}

// Game Loop
function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// Start Game
gameLoop();
    </script>
</body>
</html>
